<!DOCTYPE html>
<html>

<head>
    <title>Register</title>
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="auth-container">

<h2>📝 Register</h2>

<select id="role" onchange="toggleDoctorFields()">
<option value="patient">Patient</option>
<option value="doctor">Doctor</option>
</select>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="password" placeholder="Password">
<input type="number" id="age" placeholder="Age">

<div id="doctorFields">
<input id="license" placeholder="License ID">
</div>

<button onclick="register()">Register</button>

<p>Already have account? <a href="login.html">Login</a></p>

</div>

<script>
function toggleDoctorFields(){
    const role = document.getElementById("role").value
    document.getElementById("doctorFields").style.display =
        role === "doctor" ? "block" : "none"
}
</script>

<script src="js/script.js"></script>

</body>
</html>
