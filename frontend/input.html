<!DOCTYPE html>
<html>

<head>
<title>Kidney Digital Twin - Assessment</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:,">

</head>

<body>

<div class="navbar">
    <div class="menu-icon" onclick="toggleSidebar()">☰</div>
    <h2>Kidney Digital Twin</h2>
</div>

<div id="sidebar" class="sidebar">
    <a href="input.html">🏠 Home</a>
    <a href="result.html">📊 Reports</a>
    <a href="doctor.html">👨‍⚕️ Doctors</a>
    <a href="#" onclick="logout()">🚪 Logout</a>
</div>

<div class="form-page">

<div class="form-card large">

<h2>Kidney Risk Assessment</h2>

<!-- MODE SELECT -->
<h3>Select Input Mode</h3>
<select id="mode" onchange="toggleMode()">
<option value="advanced">Advanced (Manual)</option>
<option value="simple">Simple (Easy)</option>
</select>

<!-- SIMPLE MODE (OUTSIDE GRID) -->
<div id="simpleMode" style="display:none; margin-top:20px;">

<h3>Simple Health Questions</h3>

<label>Do you have diabetes?</label>
<select id="s_diabetes">
<option>No</option>
<option>Yes</option>
</select>

<label>Do you have high blood pressure?</label>
<select id="s_bp">
<option>No</option>
<option>Yes</option>
</select>

<label>Do you feel swelling in legs?</label>
<select id="s_swelling">
<option>No</option>
<option>Yes</option>
</select>

<label>Do you feel tired frequently?</label>
<select id="s_fatigue">
<option>No</option>
<option>Yes</option>
</select>

</div>

<!-- EXTRA FEATURES -->
<div style="margin-top:20px;">
<h3>Upload Medical Report</h3>
<input type="file" id="reportUpload">
<button type="button" onclick="uploadReport()">Analyze Report</button>
</div>


<div style="margin-top:10px;">
<button type="button" onclick="startVoice()">🎤 Speak Input</button>
</div>

<div id="voiceOutput" style="margin-top:10px; color:#2563EB; font-weight:500;"></div>

<!-- FORM -->
<form id="patientForm" onsubmit="return false;">

<form id="patientForm">

<!-- 🟢 BASIC DETAILS ALWAYS VISIBLE -->
<div class="basic-details">

<div>
<label>Patient Name</label>
<input type="text" id="name" required>
</div>

<div>
<label>Age</label>
<input type="number" id="age" required>
</div>

<div>
<label>Weight (kg)</label>
<input type="number" id="weight" required>
</div>

<div>
<label>Gender</label>
<select id="gender">
<option>Male</option>
<option>Female</option>
</select>
</div>

</div>

<!-- ADVANCED FORM -->
<div class="form-grid">

<!-- VITALS -->
<div>
<label>Blood Pressure</label>
<input type="number" id="bp" required>
</div>

<div>
<label>Heart Rate</label>
<input type="number" id="heart_rate">
</div>

<!-- LAB VALUES -->
<div>
<label>Creatinine</label>
<input type="number" step="0.01" id="creatinine" required>
</div>

<div>
<label>Glucose</label>
<input type="number" id="glucose" required>
</div>

<div>
<label>Urea</label>
<input type="number" id="urea">
</div>

<div>
<label>Sodium</label>
<input type="number" id="sodium">
</div>

<div>
<label>Potassium</label>
<input type="number" id="potassium">
</div>

<!-- LIFESTYLE -->
<div>
<label>Hydration</label>
<select id="hydration">
<option>Low</option>
<option>Normal</option>
<option>High</option>
</select>
</div>

<div>
<label>Water Intake (L/day)</label>
<input type="number" id="water_intake">
</div>

<div>
<label>Salt Intake</label>
<select id="salt">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>
</div>

<div>
<label>Smoking</label>
<select id="smoking">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div>
<label>Alcohol</label>
<select id="alcohol">
<option>No</option>
<option>Yes</option>
</select>
</div>

<!-- MEDICAL HISTORY -->
<div>
<label>Diabetes</label>
<select id="diabetes">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div>
<label>Kidney Disease History</label>
<select id="kidney_history">
<option>No</option>
<option>Yes</option>
</select>
</div>

</div>

<button type="submit">Run Digital Twin Simulation</button>

</form>

</div>

</div>

<script src="js/script.js"></script>
<script>
function logout(){
    localStorage.clear()
    window.location.href = "login.html"
}

window.onload = function(){
    toggleMode()
}
</script>

</body>
</html>
